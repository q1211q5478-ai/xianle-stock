<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>🍗 鮮樂炸雞 - 庫存填報</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #FF8C00;
      --orange-light: #FFF4E6;
      --green: #2E7D32;
      --green-light: #E8F5E9;
      --red: #D32F2F;
      --red-light: #FFEBEE;
      --yellow: #F57C00;
      --yellow-light: #FFF3E0;
      --bg: #F5F6FA;
      --card: #FFFFFF;
      --text: #1A1A2E;
      --text-sub: #8E8E9A;
      --border: #EDEDF0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding-bottom: 90px;
      color: var(--text);
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #FF8C00 0%, #FF6B00 100%);
      color: white;
      padding: 24px 20px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(255,140,0,0.3);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 20px; font-weight: 800; letter-spacing: 0.5px; }
    .conn-dot {
      width: 10px; height: 10px;
      background: #4CAF50;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    .conn-dot.offline { background: #ff4444; animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .conn-label { font-size: 12px; opacity: 0.9; }
    .conn-label span { opacity: 0.7; font-size: 11px; }

    /* KPI Summary Bar */
    .kpi-bar {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .kpi-card {
      background: rgba(255,255,255,0.18);
      border-radius: 12px;
      padding: 10px 8px;
      text-align: center;
      backdrop-filter: blur(10px);
    }
    .kpi-card .num {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      line-height: 1;
    }
    .kpi-card .lbl {
      font-size: 10px;
      opacity: 0.8;
      margin-top: 3px;
      color: #fff;
    }
    .kpi-card.alert .num { color: #FF6B6B; }
    .kpi-card.fill .num { color: #7DFFB3; }

    /* Progress Bar */
    .progress-wrap {
      margin-top: 12px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 5px;
    }
    .progress-track {
      height: 6px;
      background: rgba(255,255,255,0.25);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7DFFB3, #00E676);
      border-radius: 3px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;
    }

    /* Store Selector */
    .store-selector {
      display: flex;
      gap: 10px;
      padding: 14px 16px 0;
    }
    .store-btn {
      flex: 1;
      padding: 13px;
      border: 2px solid var(--border);
      border-radius: 14px;
      background: var(--card);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--text-sub);
    }
    .store-btn.active {
      border-color: var(--orange);
      background: var(--orange-light);
      color: var(--orange);
      box-shadow: 0 2px 12px rgba(255,140,0,0.2);
    }

    /* Alert Banner */
    .alert-banner {
      margin: 12px 16px 0;
      background: var(--red-light);
      border: 1.5px solid #FFCDD2;
      border-radius: 12px;
      padding: 10px 14px;
      display: none;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--red);
      font-weight: 600;
    }
    .alert-banner.show { display: flex; }
    .alert-banner .icon { font-size: 18px; }
    .alert-banner .items { flex: 1; }
    .alert-banner .count-badge {
      background: var(--red);
      color: #fff;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 700;
    }

    /* Section */
    .section {
      padding: 16px 16px 4px;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .section-title.daily { color: var(--orange); }
    .section-title.weekly { color: #2E7D32; }
    .section-count {
      font-size: 12px;
      color: var(--text-sub);
      background: var(--bg);
      padding: 2px 10px;
      border-radius: 10px;
    }

    /* Item Grid */
    .item-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .item-card {
      background: var(--card);
      border-radius: 16px;
      padding: 14px 8px 12px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: transform 0.15s, box-shadow 0.15s;
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
    }
    .item-card:active {
      transform: scale(0.95);
    }
    .item-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 16px 16px 0 0;
    }
    .item-card.status-ok::before { background: var(--green); }
    .item-card.status-low::before { background: var(--yellow); }
    .item-card.status-critical::before { background: var(--red); }
    .item-card.status-empty::before { background: var(--border); }
    .item-card.status-ok { border-color: #C8E6C9; }
    .item-card.status-low { border-color: #FFE0B2; background: #FFFBF5; }
    .item-card.status-critical { border-color: #FFCDD2; background: #FFF9F9; }

    .item-card .name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }
    .item-card .sub {
      font-size: 10px;
      color: var(--text-sub);
      margin-bottom: 6px;
      line-height: 1.2;
    }
    .item-card .stock-display {
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 2px;
    }
    .item-card.status-ok .stock-display { color: var(--green); }
    .item-card.status-low .stock-display { color: var(--yellow); }
    .item-card.status-critical .stock-display { color: var(--red); }
    .item-card.status-empty .stock-display { color: var(--text-sub); font-size: 14px; font-weight: 600; }
    .item-card .unit-label {
      font-size: 10px;
      color: var(--text-sub);
    }
    .item-card .status-badge {
      position: absolute;
      top: 6px; right: 6px;
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 6px;
      font-weight: 700;
    }
    .status-ok .status-badge { background: var(--green-light); color: var(--green); }
    .status-low .status-badge { background: var(--yellow-light); color: var(--yellow); }
    .status-critical .status-badge { background: var(--red-light); color: var(--red); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: white;
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 480px;
      padding: 28px 24px 40px;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .modal-overlay.show .modal {
      transform: translateY(0);
    }
    .modal-handle {
      width: 36px; height: 4px;
      background: #DDD;
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal-title {
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      color: var(--text);
      margin-bottom: 4px;
    }
    .modal-sub {
      text-align: center;
      font-size: 13px;
      color: var(--text-sub);
      margin-bottom: 24px;
    }
    .modal-input-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .modal-input {
      flex: 1;
      padding: 20px;
      font-size: 32px;
      font-weight: 800;
      text-align: center;
      border: 2.5px solid var(--orange);
      border-radius: 16px;
      outline: none;
      background: #FFF;
      color: #000;
      -webkit-text-fill-color: #000 !important;
      width: 100%;
      box-shadow: 0 0 0 4px rgba(255,140,0,0.1);
    }
    .modal-input::placeholder { color: #CCC; font-size: 22px; font-weight: 600; }
    .modal-unit { font-size: 16px; color: var(--text-sub); min-width: 40px; font-weight: 600; }
    .modal-submit {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #FF8C00, #FF6B00);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(255,140,0,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .modal-submit:active { transform: scale(0.97); }
    .modal-submit:disabled { background: #CCC; box-shadow: none; }
    .modal-cancel {
      width: 100%;
      padding: 14px;
      background: var(--bg);
      color: var(--text-sub);
      border: none;
      border-radius: 14px;
      font-size: 14px;
      margin-top: 10px;
      cursor: pointer;
      font-weight: 600;
    }

    /* Status Toast */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      z-index: 3000;
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--green); color: #fff; }
    .toast.error { background: var(--red); color: #fff; }
    .toast.sending { background: #555; color: #fff; }

    /* Loading */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      gap: 12px;
    }
    .loading-overlay.hidden { display: none; }
    .loading-spinner {
      width: 36px; height: 36px;
      border: 4px solid #FFE0B2;
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 15px; color: #666; font-weight: 600; }

    /* Install hint */
    .install-hint {
      position: fixed;
      bottom: 80px;
      left: 12px;
      right: 12px;
      background: #1A1A2E;
      color: white;
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 13px;
      text-align: center;
      z-index: 999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .install-hint b { color: var(--orange); }
    .install-hint span { float: right; cursor: pointer; opacity: 0.7; }
  </style>
</head>

      { id: 'W020', cn: '可樂', vi: 'Cola', unit: '罐', low: 24 },
      { id: 'W021', cn: '雪碧', vi: 'Sprite', unit: '罐', low: 24 },
      { id: 'W022', cn: '竹籤', vi: 'Xiên', unit: '包', low: 2 },
      { id: 'W023', cn: '八兩紙袋', vi: 'Túi Giấy to', unit: '包', low: 10 },
      { id: 'W024', cn: '六兩紙袋', vi: 'Túi Giấy Vừa', unit: '包', low: 10 },
      { id: 'W025', cn: '四兩紙袋', vi: 'Túi Giấy Nhỏ', unit: '包', low: 10 },
      { id: 'W026', cn: '飲料袋', vi: 'Túi Ức Gà', unit: '包', low: 5 },
      { id: 'W027', cn: '半斤提袋', vi: 'Túi Vàng', unit: '包', low: 5 },
      { id: 'W028', cn: '四兩提袋', vi: 'Túi Cam', unit: '包', low: 8 },
    ]
  };

  // ===== 狀態 =====
  let currentStore = '總店';
  let currentItem = null;
  let currentStock = {};
  let unsubscribe = null;

  // ===== 初始化 =====
  window.addEventListener('DOMContentLoaded', () => {
    const now = new Date();
    document.getElementById('today-label').textContent = now.toLocaleDateString('zh-TW', { month: 'short', day: 'numeric' });
    renderDaily();
    renderWeekly();
    updateKPI();
    document.getElementById('modal-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') submitFromModal();
    });
    if (navigator.standalone) {
      document.getElementById('install-hint').style.display = 'none';
    }
  });

  // ===== 卡片狀態 helper =====
  function getCardStatus(item, stock) {
    if (stock === undefined || stock === null) return 'empty';
    if (stock === 0) return 'critical';
    if (stock <= item.low * 0.5) return 'critical';
    if (stock <= item.low) return 'low';
    return 'ok';
  }

  function getStatusBadge(item, stock) {
    const s = getCardStatus(item, stock);
    if (s === 'ok') return '✓ 充足';
    if (s === 'low') return '⚠ 偏低';
    if (s === 'critical') return '✕ 急補';
    return '○ 未填';
  }

  // ===== 構建卡片 =====
  function buildItemCard(item) {
    const stock = currentStock[item.id];
    const status = getCardStatus(item, stock);
    const badge = getStatusBadge(item, stock);
    const stockDisplay = stock !== undefined
      ? `<div class="stock-display">${stock}</div><div class="unit-label">${item.unit}</div>`
      : `<div class="stock-display">—</div><div class="unit-label" style="opacity:0">—</div>`;
    return `
      <div class="item-card status-${status}" onclick="openModal('${item.id}')">
        <div class="status-badge">${badge}</div>
        <div class="name">${item.cn}</div>
        <div class="sub">${item.vi}</div>
        ${stockDisplay}
      </div>
    `;
  }

  // ===== 渲染 =====
  window.renderDaily = function() {
    document.getElementById('daily-grid').innerHTML = ITEMS.daily.map(buildItemCard).join('');
    updateCounts();
  };
  window.renderWeekly = function() {
    document.getElementById('weekly-grid').innerHTML = ITEMS.weekly.map(buildItemCard).join('');
    updateCounts();
  };

  function updateCounts() {
    const dailyFilled = ITEMS.daily.filter(i => currentStock[i.id] !== undefined).length;
    const weeklyFilled = ITEMS.weekly.filter(i => currentStock[i.id] !== undefined).length;
    document.getElementById('daily-count').textContent = `${dailyFilled}/${ITEMS.daily.length}`;
    document.getElementById('weekly-count').textContent = `${weeklyFilled}/${ITEMS.weekly.length}`;
  }

  // ===== KPI 更新 =====
  function updateKPI() {
    const allItems = [...ITEMS.daily, ...ITEMS.weekly];
    const total = allItems.length;
    const filled = allItems.filter(i => currentStock[i.id] !== undefined).length;
    const pct = total > 0 ? Math.round(filled / total * 100) : 0;

    // 計算需補貨品項（庫存低於 low 警戒線）
    const alertItems = allItems.filter(i => {
      const s = currentStock[i.id];
      return s !== undefined && s <= i.low;
    });

    document.getElementById('kpi-filled').textContent = filled;
    document.getElementById('kpi-total').textContent = total;
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';

    const alertCard = document.getElementById('kpi-alert-card');
    const alertBanner = document.getElementById('alert-banner');
    if (alertItems.length > 0) {
      alertCard.style.display = 'block';
      document.getElementById('kpi-alert').textContent = alertItems.length;
      alertBanner.classList.add('show');
      document.getElementById('alert-count').textContent = alertItems.length + '項';
      alertBanner.querySelector('.items').textContent =
        alertItems.slice(0, 3).map(i => i.cn).join('、') +
        (alertItems.length > 3 ? `...等${alertItems.length}項` : '');
    } else {
      alertCard.style.display = 'none';
      alertBanner.classList.remove('show');
    }
  }

  // ===== 選擇店別 =====
  window.selectStore = async function(store) {
    currentStore = store;
    document.getElementById('store-label').textContent = store;
    document.querySelectorAll('.store-btn').forEach(btn => {
      btn.classList.toggle('active',
        (store === '總店' && btn.textContent.includes('總店')) ||
        (store === '麥金店' && btn.textContent.includes('麥金店'))
      );
    });
    await loadStockData(store);
  };

  // ===== 載入 Firebase =====
  async function loadStockData(store) {
    if (unsubscribe) unsubscribe();
    try {
      const today = new Date().toISOString().split('T')[0];
      const docRef = doc(db, 'stock', `${store}_${today}`);
      unsubscribe = onSnapshot(docRef, (snap) => {
        if (snap.exists()) {
          const d = snap.data();
          // 相容兩種格式
          if (d.items && typeof d.items === 'object') {
            currentStock = {};
            for (const [k, v] of Object.entries(d.items)) {
              currentStock[k] = typeof v === 'number' ? v
                : (v?.integerValue !== undefined ? parseInt(v.integerValue) : v?.doubleValue);
            }
          } else {
            currentStock = {};
            for (const [k, v] of Object.entries(d)) {
              if (k.startsWith('items.')) {
                const id = k.replace('items.', '');
                currentStock[id] = typeof v === 'number' ? v
                  : (v?.integerValue !== undefined ? parseInt(v.integerValue) : v?.doubleValue);
              }
            }
          }
        } else {
          currentStock = {};
        }
        renderDaily();
        renderWeekly();
        updateKPI();
        document.getElementById('loading').classList.add('hidden');
        setConnStatus(true);
      }, (err) => {
        console.error(err);
        setConnStatus(false);
        document.getElementById('loading').classList.add('hidden');
      });
    } catch (e) {
      console.error(e);
      setConnStatus(false);
      document.getElementById('loading').classList.add('hidden');
    }
  }

  function setConnStatus(ok) {
    const dot = document.getElementById('conn-dot');
    const txt = document.getElementById('conn-text');
    if (ok) {
      dot.classList.remove('offline');
      txt.textContent = '🔥 已連線';
    } else {
      dot.classList.add('offline');
      txt.textContent = '❌ 連線失敗';
    }
  }

  // ===== Modal =====
  window.openModal = function(itemId) {
    const allItems = [...ITEMS.daily, ...ITEMS.weekly];
    currentItem = allItems.find(i => i.id === itemId);
    if (!currentItem) {
      showToast('❌ 品項不存在，請重新整理頁面', 'error');
      console.error('openModal: item not found', itemId, 'available ids:', allItems.map(i=>i.id));
      return;
    }
    document.getElementById('modal-title').textContent = currentItem.cn;
    document.getElementById('modal-sub').textContent = currentItem.vi;
    document.getElementById('modal-unit').textContent = currentItem.unit;
    document.getElementById('modal-input').value =
      currentStock[itemId] !== undefined ? currentStock[itemId] : '';
    document.getElementById('modal').classList.add('show');
    setTimeout(() => document.getElementById('modal-input').focus(), 350);
  };
  window.closeModal = function() {
    document.getElementById('modal').classList.remove('show');
    currentItem = null;
  };

  // ===== 送出 =====
  window.submitFromModal = async function() {
    const val = document.getElementById('modal-input').value;
    const n = parseFloat(val);
    const btn = document.getElementById('modal-submit');
    if (!currentItem) {
      showToast('❌ 系統錯誤，請重新開啟視窗', 'error');
      return;
    }
    if (val === '' || isNaN(n) || n < 0) {
      showToast('❌ 請輸入有效的數量', 'error');
      return;
    }
    btn.disabled = true;
    showToast('送出中...', 'sending');
    try {
      const today = new Date().toISOString().split('T')[0];
      await setDoc(doc(db, 'stock', `${currentStore}_${today}`), {
        [`items.${currentItem.id}`]: n,
        updatedAt: serverTimestamp(),
        store: currentStore, date: today
      }, { merge: true });
      const itemName = currentItem.cn;
      const itemUnit = currentItem.unit;
      closeModal();
      showToast(`✅ 已更新：${itemName} = ${n} ${itemUnit}`, 'success');
    } catch (e) {
      console.error(e);
      showToast(`❌ 更新失敗：${e.message}`, 'error');
    }
    btn.disabled = false;
  };

  // ===== Toast =====
  window.showToast = function(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.classList.remove('show'); }, 3500);
  };

  // 點外面關閉
  document.getElementById('modal').addEventListener('click', (e) => {
    if (e.target.id === 'modal') closeModal();
  });

  // 啟動
  loadStockData('總店');
</script>
</body>
</html>
