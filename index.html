<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="鮮樂庫存">
  <meta name="theme-color" content="#d4a056">
  <title>🍗 鮮樂炸雞 庫存填報</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff8f0;
      min-height: 100vh;
      padding: 16px;
    }
    .app-header {
      background: linear-gradient(135deg, #d4a056, #c4903f);
      color: white;
      padding: 20px 16px;
      border-radius: 16px;
      margin-bottom: 20px;
      text-align: center;
    }
    .app-header h1 { font-size: 22px; margin-bottom: 4px; }
    .app-header p { font-size: 13px; opacity: 0.9; }
    
    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .card-title {
      font-size: 14px;
      color: #888;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .store-tabs {
      display: flex;
      gap: 8px;
    }
    .store-tab {
      flex: 1;
      padding: 12px;
      border: 2px solid #eee;
      border-radius: 12px;
      text-align: center;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .store-tab.active {
      border-color: #d4a056;
      background: #fff8f0;
      color: #d4a056;
    }
    .store-tab .emoji { font-size: 24px; display: block; margin-bottom: 4px; }
    .store-tab .name { font-size: 13px; }
    
    .item-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .item-btn {
      padding: 14px 10px;
      border: 2px solid #eee;
      border-radius: 12px;
      background: white;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .item-btn:hover, .item-btn.selected {
      border-color: #d4a056;
      background: #fff8f0;
    }
    .item-btn.selected {
      box-shadow: 0 0 0 3px rgba(212,160,86,0.3);
    }
    .item-btn .cn { font-size: 14px; font-weight: 600; color: #333; }
    .item-btn .vi { font-size: 11px; color: #888; margin-top: 2px; }
    
    .input-group {
      margin-top: 16px;
    }
    .input-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
      display: block;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .input-field {
      flex: 1;
      padding: 14px 16px;
      border: 2px solid #eee;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-field:focus {
      border-color: #d4a056;
    }
    .input-unit {
      font-size: 14px;
      color: #888;
      min-width: 40px;
    }
    
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #d4a056, #c4903f);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
      transition: transform 0.1s, opacity 0.2s;
    }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .status-bar {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
    .status-bar.success { background: #d4edda; color: #155724; display: block; }
    .status-bar.error { background: #f8d7da; color: #721c24; display: block; }
    
    .history {
      margin-top: 20px;
    }
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
      font-size: 13px;
    }
    .history-item .time { color: #888; font-size: 12px; }
    .history-item .val { font-weight: 700; color: #d4a056; }
    
    .nav-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #eee;
      display: flex;
      padding: 8px 0;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }
    .nav-item {
      flex: 1;
      text-align: center;
      font-size: 11px;
      color: #888;
      cursor: pointer;
    }
    .nav-item.active { color: #d4a056; }
    .nav-item .icon { font-size: 22px; display: block; }
    
    .page { display: none; }
    .page.active { display: block; }
    
    .stock-display {
      font-size: 13px;
      color: #666;
      text-align: center;
      padding: 8px;
      margin-top: 8px;
    }
    .stock-display strong { color: #d4a056; font-size: 16px; }
  </style>
</head>
<body>

<!-- 頁面1：填報 -->
<div id="page-report" class="page active">
  <div class="app-header">
    <h1>🍗 鮮樂炸雞</h1>
    <p>庫存填報系統</p>
  </div>
  
  <div class="card">
    <div class="card-title">🏪 選擇店別</div>
    <div class="store-tabs">
      <div class="store-tab active" onclick="selectStore('總店')">
        <span class="emoji">🏠</span>
        <span class="name">總店</span>
      </div>
      <div class="store-tab" onclick="selectStore('麥金店')">
        <span class="emoji">🏪</span>
        <span class="name">麥金店</span>
      </div>
    </div>
  </div>
  
  <div class="card">
    <div class="card-title">📦 選擇品項</div>
    <div class="item-grid" id="item-grid">
      <!-- 動態產生 -->
    </div>
    <div class="stock-display" id="stock-display"></div>
  </div>
  
  <div class="card">
    <div class="card-title">📝 填寫今日庫存</div>
    <div class="input-group">
      <div class="input-row">
        <input type="number" class="input-field" id="stock-input" placeholder="0" inputmode="numeric">
        <span class="input-unit" id="unit-display">盒</span>
      </div>
    </div>
  </div>
  
  <button class="submit-btn" id="submit-btn" onclick="submitStock()" disabled>
    送出填報
  </button>
  
  <div class="status-bar" id="status-bar"></div>
  
  <div class="history" id="history-list">
    <div class="card-title">📋 最近填報紀錄</div>
  </div>
</div>

<!-- 頁面2：總覽 -->
<div id="page-overview" class="page">
  <div class="app-header">
    <h1>📊 庫存總覽</h1>
    <p>兩店即時庫存一目了然</p>
  </div>
  
  <div class="card">
    <div class="card-title">🔴 低庫存警示</div>
    <div id="alert-list">載入中...</div>
  </div>
  
  <div class="card">
    <div class="card-title">📦 總店庫存</div>
    <div id="store1-stock">載入中...</div>
  </div>
  
  <div class="card">
    <div class="card-title">📦 麥金店庫存</div>
    <div id="store2-stock">載入中...</div>
  </div>
</div>

<!-- 底部導航 -->
<div class="nav-bar">
  <div class="nav-item active" onclick="switchPage('report')">
    <span class="icon">📝</span>
    填報
  </div>
  <div class="nav-item" onclick="switchPage('overview')">
    <span class="icon">📊</span>
    總覽
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
