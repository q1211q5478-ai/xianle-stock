<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>🍗 鮮樂炸雞 - 庫存填報</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FAFAFA;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* Header */
    .header {
      background: #FF8C00;
      color: white;
      padding: 20px 16px 16px;
      text-align: center;
    }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header p { font-size: 12px; opacity: 0.9; margin-top: 4px; }

    /* Store Selector */
    .store-selector {
      display: flex;
      gap: 12px;
      padding: 16px;
      background: white;
      margin: 12px;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .store-btn {
      flex: 1;
      padding: 14px;
      border: 2px solid #E0E0E0;
      border-radius: 12px;
      background: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .store-btn.active {
      border-color: #FF8C00;
      background: #FFF4E6;
      color: #FF8C00;
    }

    /* Item Grid */
    .section-title {
      padding: 12px 16px 8px;
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .item-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 0 12px;
    }
    .item-card {
      background: white;
      border-radius: 14px;
      padding: 16px 8px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .item-card:active {
      transform: scale(0.96);
    }
    .item-card .name { font-size: 14px; font-weight: 600; color: #333; }
    .item-card .sub { font-size: 11px; color: #999; margin-top: 2px; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: white;
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 420px;
      padding: 24px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .modal-overlay.show .modal {
      transform: translateY(0);
    }
    .modal-handle {
      width: 36px;
      height: 4px;
      background: #DDD;
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      color: #333;
      margin-bottom: 4px;
    }
    .modal-sub {
      text-align: center;
      font-size: 13px;
      color: #999;
      margin-bottom: 20px;
    }
    .modal-input-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .modal-input {
      -webkit-text-fill-color: #000 !important;
      flex: 1;
      padding: 18px;
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      border: 2px solid #FF8C00;
      border-radius: 14px;
      outline: none;
      background: #FFF;
      color: #333;
      width: 100%;
    }
    .modal-unit {
      font-size: 16px;
      color: #666;
      min-width: 40px;
    }
    .modal-submit {
      width: 100%;
      padding: 16px;
      background: #FF8C00;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .modal-cancel {
      width: 100%;
      padding: 14px;
      background: #F5F5F5;
      color: #666;
      border: none;
      border-radius: 14px;
      font-size: 14px;
      margin-top: 10px;
      cursor: pointer;
    }

    /* Status */
    .status-bar {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin: 12px;
      display: none;
    }
    .status-bar.show { display: block; }
    .status-bar.success { background: #E8F5E9; color: #2E7D32; }
    .status-bar.error { background: #FFEBEE; color: #C62828; }

    /* Install hint */
    .install-hint {
      position: fixed;
      bottom: 80px;
      left: 12px;
      right: 12px;
      background: #333;
      color: white;
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 13px;
      text-align: center;
      z-index: 999;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>🍗 鮮樂炸雞</h1>
  <p>庫存填報系統</p>
</div>

<div class="store-selector">
  <button class="store-btn active" onclick="selectStore('總店')">🏠 總店</button>
  <button class="store-btn" onclick="selectStore('麥金店')">🏪 麥金店</button>
</div>

<div class="section-title">每日品項</div>
<div class="item-grid" id="daily-grid"></div>

<div class="section-title" style="margin-top:16px">每週品項</div>
<div class="item-grid" id="weekly-grid"></div>

<div id="status-bar" class="status-bar"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">雞腿</div>
    <div class="modal-sub" id="modal-sub">Đùi gà</div>
    <div class="modal-input-wrap">
      <input type="number" class="modal-input" id="modal-input" inputmode="numeric" placeholder="0">
      <span class="modal-unit" id="modal-unit">盒</span>
    </div>
    <button class="modal-submit" id="modal-submit">✅ 送出填報</button>
    <button class="modal-cancel" onclick="closeModal()">取消</button>
  </div>
</div>

<!-- Install hint (iPhone) -->
<div class="install-hint" id="install-hint">
  📱 iPhone：用 Safari 開啟後，點分享 → <b>加入主畫面</b>
</div>

<script>
// ===== 品項資料 =====
const ITEMS = {
  daily: [
    { id: 'D001', cn: '雞腿', vi: 'Đùi gà', unit: '盒' },
    { id: 'D002', cn: '雞翅', vi: 'Cánh gà', unit: '盒' },
    { id: 'D003', cn: '雞塊', vi: 'Khối gà', unit: '盒' },
    { id: 'D004', cn: '鹹酥雞', vi: 'Gà muối', unit: '包' },
    { id: 'D005', cn: '薯條', vi: 'Khoai tây', unit: '包' },
    { id: 'D006', cn: '地瓜', vi: 'Khoai lang', unit: '包' },
    { id: 'D007', cn: '銀絲捲', vi: 'Cuộn bạc', unit: '包' },
    { id: 'D008', cn: '甜不辣', vi: 'Tempura', unit: '包' },
    { id: 'D009', cn: '天婦羅', vi: 'Tempura Nhật', unit: '包' },
    { id: 'D010', cn: '裹粉', vi: 'Bột tẩm', unit: '包' },
    { id: 'D011', cn: '脆皮粉', vi: 'Bột giòn', unit: '包' },
    { id: 'D012', cn: '胡椒粉', vi: 'Tiêu bột', unit: '罐' },
    { id: 'D013', cn: '梅粉', vi: 'Bột mè', unit: '罐' },
    { id: 'D014', cn: '回鍋油', vi: 'Dầu tái chế', unit: '公升' },
    { id: 'D015', cn: '新油', vi: 'Dầu mới', unit: '公升' },
  ],
  weekly: [
    { id: 'W001', cn: '魚漿', vi: 'Bột cá', unit: '公斤' },
    { id: 'W002', cn: '天婦羅皮', vi: 'Vỏ tempura', unit: '包' },
    { id: 'W003', cn: '甜不辣糊', vi: 'Bột tempura', unit: '公斤' },
    { id: 'W004', cn: '包蛋黑輪', vi: 'Trứng bọc', unit: '條' },
    { id: 'W005', cn: '牛蒡天婦羅', vi: 'Tempura củ cải', unit: '包' },
    { id: 'W006', cn: '小卷天婦羅', vi: 'Tempura mực', unit: '包' },
    { id: 'W007', cn: '魷魚天婦羅', vi: 'Tempura mực ống', unit: '包' },
    { id: 'W008', cn: '花枝天婦羅', vi: 'Tempura bạch văn', unit: '包' },
  ]
};

// ===== 狀態 =====
let currentStore = '總店';
let currentItem = null;

// ===== API URL =====
const API_URL = 'https://script.google.com/macros/s/AKfycbyUqgTS1bnddKR9-Ca4bti-aT6VPpmJXlYbmSzFW1hsUJQZaxaKrOJbeUZ2D2zD33Lqcg/exec';

// ===== 初始化 =====
document.addEventListener('DOMContentLoaded', () => {
  renderDaily();
  renderWeekly();
  document.getElementById('modal-submit').onclick = submitFromModal;
  document.getElementById('modal-input').onkeypress = (e) => {
    if (e.key === 'Enter') submitFromModal();
  };
});

// ===== 渲染品項 =====
function renderDaily() {
  const grid = document.getElementById('daily-grid');
  grid.innerHTML = ITEMS.daily.map(item => `
    <div class="item-card" onclick="openModal('${item.id}')">
      <div class="name">${item.cn}</div>
      <div class="sub">${item.vi}</div>
    </div>
  `).join('');
}

function renderWeekly() {
  const grid = document.getElementById('weekly-grid');
  grid.innerHTML = ITEMS.weekly.map(item => `
    <div class="item-card" onclick="openModal('${item.id}')">
      <div class="name">${item.cn}</div>
      <div class="sub">${item.vi}</div>
    </div>
  `).join('');
}

// ===== 選擇店別 =====
function selectStore(store) {
  currentStore = store;
  document.querySelectorAll('.store-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.includes(store));
  });
}

// ===== 開啟 Modal =====
function openModal(itemId) {
  const allItems = [...ITEMS.daily, ...ITEMS.weekly];
  currentItem = allItems.find(i => i.id === itemId);
  
  document.getElementById('modal-title').textContent = currentItem.cn;
  document.getElementById('modal-sub').textContent = currentItem.vi;
  document.getElementById('modal-unit').textContent = currentItem.unit;
  document.getElementById('modal-input').value = '';
  
  const modal = document.getElementById('modal');
  modal.classList.add('show');
  setTimeout(() => document.getElementById('modal-input').focus(), 300);
}

// ===== 關閉 Modal =====
function closeModal() {
  document.getElementById('modal').classList.remove('show');
  currentItem = null;
}

// ===== 送出 =====
async function submitFromModal() {
  const value = parseFloat(document.getElementById('modal-input').value);
  const statusBar = document.getElementById('status-bar');
  
  if (!value || value < 0) {
    showStatus('❌ 請輸入有效的數量', 'error');
    return;
  }
  
  closeModal();
  showStatus(`送出中... ${currentStore} ${currentItem.cn} = ${value}`, '');
  
  // 使用 GET 方式
  const url = `${API_URL}?action=updateStock&store=${encodeURIComponent(currentStore)}&itemId=${encodeURIComponent(currentItem.id)}&value=${value}`;
  
  try {
    const response = await fetch(url);
    const result = await response.json();
    
    if (result.success) {
      showStatus(`✅ 已更新：${currentStore} ${currentItem.cn} = ${value} ${currentItem.unit}`, 'success');
      addHistory(currentItem.cn, value, currentItem.unit);
    } else {
      showStatus(`❌ 更新失敗：${result.error}`, 'error');
    }
  } catch (e) {
    showStatus(`❌ 更新失敗：網路錯誤`, 'error');
  }
}

// ===== 顯示狀態 =====
function showStatus(msg, type) {
  const bar = document.getElementById('status-bar');
  bar.textContent = msg;
  bar.className = 'status-bar show ' + type;
  setTimeout(() => { bar.className = 'status-bar'; }, 4000);
}

// ===== 歷史 =====
function addHistory(itemName, value, unit) {
  const history = JSON.parse(localStorage.getItem('stockHistory') || '[]');
  history.unshift({
    time: new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' }),
    store: currentStore,
    item: itemName,
    value: value,
    unit: unit
  });
  if (history.length > 10) history.pop();
  localStorage.setItem('stockHistory', JSON.stringify(history));
}

// 點外面關閉 Modal
document.getElementById('modal').onclick = (e) => {
  if (e.target.id === 'modal') closeModal();
};
</script>
</body>
</html>
