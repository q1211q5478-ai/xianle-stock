<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍗 鮮樂炸雞 - 老闆視角</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #FF8C00;
      --orange-dim: rgba(255,140,0,0.15);
      --green: #00C853;
      --green-dim: rgba(0,200,83,0.15);
      --red: #FF1744;
      --red-dim: rgba(255,23,68,0.15);
      --yellow: #FF9100;
      --yellow-dim: rgba(255,145,0,0.15);
      --bg: #0D0D1A;
      --card: #16162A;
      --card-hover: #1E1E38;
      --border: #2A2A45;
      --text: #FFFFFF;
      --text-sub: #6B6B8D;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
      padding-bottom: 30px;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 10px 0 20px;
    }
    .header h1 {
      font-size: 26px;
      font-weight: 900;
      background: linear-gradient(135deg, #FF8C00, #FFAB40);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p { font-size: 12px; color: var(--text-sub); margin-top: 4px; }

    /* KPI Row */
    .kpi-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .kpi-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 10px;
      text-align: center;
    }
    .kpi-card .icon { font-size: 20px; margin-bottom: 6px; }
    .kpi-card .val {
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 4px;
    }
    .kpi-card .lbl { font-size: 10px; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px; }
    .kpi-card.red .val { color: var(--red); }
    .kpi-card.orange .val { color: var(--yellow); }
    .kpi-card.green .val { color: var(--green); }

    /* Store Selector */
    .stores {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .store-btn {
      flex: 1;
      padding: 16px;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 14px;
      color: var(--text-sub);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .store-btn.active {
      border-color: var(--orange);
      background: var(--orange-dim);
      color: var(--orange);
      box-shadow: 0 0 20px rgba(255,140,0,0.2);
    }
    .store-btn .badge {
      background: var(--red);
      color: #fff;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 8px;
      display: none;
    }
    .store-btn.active .badge { display: inline; }

    /* Date Nav */
    .date-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      background: var(--card);
      padding: 12px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
    }
    .date-nav button {
      padding: 8px 16px;
      background: var(--border);
      border: none;
      border-radius: 8px;
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .date-nav button:active { background: var(--orange); }
    .date-nav span {
      flex: 1;
      text-align: center;
      font-size: 17px;
      font-weight: 800;
      color: var(--orange);
    }

    /* Alert Section */
    .alert-section {
      background: var(--red-dim);
      border: 1.5px solid rgba(255,23,68,0.3);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 20px;
      display: none;
    }
    .alert-section.show { display: block; }
    .alert-section .head {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 800;
      color: var(--red);
      margin-bottom: 10px;
    }
    .alert-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,23,68,0.1);
      font-size: 13px;
    }
    .alert-item:last-child { border-bottom: none; }
    .alert-item .name { font-weight: 600; color: var(--text); }
    .alert-item .vi { font-size: 11px; color: var(--text-sub); }
    .alert-item .stock {
      font-weight: 900;
      font-size: 18px;
      color: var(--red);
    }
    .alert-item .stock small {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-sub);
    }
    .alert-empty {
      text-align: center;
      color: var(--green);
      font-size: 14px;
      font-weight: 700;
      padding: 10px 0;
    }

    /* Trend Section */
    .trend-section {
      margin-bottom: 20px;
    }
    .trend-section .section-title.trend {
      background: rgba(100, 100, 255, 0.15);
      color: #8888ff;
    }
    .chart-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }

    /* Section Title */
    .section-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 800;
      padding: 8px 14px;
      border-radius: 10px;
    }
    .section-title.daily {
      background: var(--orange-dim);
      color: var(--orange);
    }
    .section-title.weekly {
      background: var(--green-dim);
      color: var(--green);
    }
    .section-title .count {
      font-size: 12px;
      opacity: 0.7;
      margin-left: 4px;
      font-weight: 600;
    }

    /* Item Grid */
    .item-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }
    .item-card {
      background: var(--card);
      border-radius: 16px;
      padding: 16px 14px;
      border: 1.5px solid var(--border);
      transition: all 0.2s;
    }
    .item-card.status-ok { border-color: rgba(0,200,83,0.25); }
    .item-card.status-low { border-color: rgba(255,145,0,0.35); background: rgba(255,145,0,0.05); }
    .item-card.status-critical { border-color: rgba(255,23,68,0.35); background: rgba(255,23,68,0.05); }
    .item-card .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .item-card .cn {
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
    }
    .item-card .vi { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
    .item-card .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 8px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .status-ok .badge { background: var(--green-dim); color: var(--green); }
    .status-low .badge { background: var(--yellow-dim); color: var(--yellow); }
    .status-critical .badge { background: var(--red-dim); color: var(--red); }
    .status-empty .badge { background: var(--border); color: var(--text-sub); }
    .status-empty .badge::before { content: '○ '; }

    .item-card .stock-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-top: 4px;
    }
    .item-card .stock-num {
      font-size: 32px;
      font-weight: 950;
      line-height: 1;
    }
    .status-ok .stock-num { color: var(--green); }
    .status-low .stock-num { color: var(--yellow); }
    .status-critical .stock-num { color: var(--red); }
    .status-empty .stock-num { color: var(--text-sub); font-size: 18px; font-weight: 700; }
    .item-card .unit { font-size: 13px; color: var(--text-sub); }
    .item-card .low-info {
      font-size: 10px;
      color: var(--text-sub);
      margin-top: 4px;
    }
    .item-card .low-info span { color: var(--red); font-weight: 700; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px 0;
      font-size: 16px;
      color: var(--text-sub);
    }
    .loading::after {
      content: '';
      display: inline-block;
      width: 20px; height: 20px;
      border: 3px solid var(--border);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 10px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* No data */
    .no-data {
      text-align: center;
      padding: 30px 0;
      color: var(--text-sub);
      font-size: 14px;
    }

    /* Debug */
    #debug {
      font-size: 10px;
      color: var(--text-sub);
      margin-top: 20px;
      padding: 8px;
      background: var(--card);
      border-radius: 8px;
      display: none;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>🍗 鮮樂炸雞</h1>
  <p>老闆視角 · 庫存儀表板</p>
</div>

<!-- KPI Row -->
<div class="kpi-row">
  <div class="kpi-card red" id="kpi-total-stock">
    <div class="icon">📦</div>
    <div class="val">—</div>
    <div class="lbl">總品項</div>
  </div>
  <div class="kpi-card orange" id="kpi-filled">
    <div class="icon">✅</div>
    <div class="val">—</div>
    <div class="lbl">已填報</div>
  </div>
  <div class="kpi-card red" id="kpi-alert">
    <div class="icon">🚨</div>
    <div class="val">0</div>
    <div class="lbl">需補貨</div>
  </div>
</div>

<!-- Store Selector -->
<div class="stores">
  <button class="store-btn active" id="btn-total" onclick="selectStore('總店')">
    🏠 總店 <span class="badge" id="badge-total">0</span>
  </button>
  <button class="store-btn" id="btn-mj" onclick="selectStore('麥金店')">
    🏪 麥金店 <span class="badge" id="badge-mj">0</span>
  </button>
</div>

<!-- Date Nav -->
<div class="date-nav">
  <button onclick="changeDate(-1)">◀</button>
  <span id="date-label">—</span>
  <button onclick="changeDate(1)">▶</button>
</div>

<!-- Alert Section -->
<div class="alert-section" id="alert-section">
  <div class="head">🚨 庫存警示</div>
  <div id="alert-list"></div>
</div>

<!-- Trend Chart Section -->
<div class="trend-section" id="trend-section" style="display:none;">
  <div class="section-head">
    <div class="section-title trend">📈 趨勢分析（7天）</div>
  </div>
  <div class="chart-container">
    <canvas id="trendChart" height="200"></canvas>
  </div>
</div>

<!-- Content -->
<div id="content">
  <div class="loading">載入中...</div>
</div>

<div id="debug"></div>

<!-- Firebase SDK -->

      { id: 'D005', cn: '雞軟骨', vi: 'Sụn gà', unit: '包', low: 3 },

      { id: 'D013', cn: '香菇', vi: 'Nấm nâu', unit: '包', low: 5 },
      { id: 'D014', cn: '豬血糕', vi: 'Tiết heo nếp', unit: '包', low: 15 },
      { id: 'D015', cn: '雞蛋豆腐', vi: 'Đậu phụ trứng', unit: '盒', low: 5 },
      { id: 'D016', cn: '雞脖子', vi: 'Cổ gà', unit: '包', low: 3 },
      { id: 'D017', cn: '耐炸油', vi: 'Dầu Rán', unit: '桶', low: 2 },
      { id: 'D018', cn: '脆皮粉', vi: 'Bột Ướt', unit: '包', low: 1 },
      { id: 'D019', cn: '白色雞排粉', vi: 'Bột Khô', unit: '包', low: 1 },
      { id: 'D020', cn: '雞皮', vi: 'Da gà', unit: '包', low: 3 },
      { id: 'D021', cn: '雞屁股', vi: 'Mông gà', unit: '支', low: 10 },
      { id: 'D022', cn: '玉米筍', vi: 'Ngô bao tử', unit: '包', low: 5 },
    ],
    weekly: [
      { id: 'W001', cn: '小卷天婦羅', vi: 'Tempura mực ống', unit: '包', low: 1 },
      { id: 'W002', cn: '包蛋天婦羅', vi: 'Tempura bọc trứng', unit: '包', low: 1 },
      { id: 'W003', cn: '地瓜', vi: 'Khoai lang', unit: '包', low: 1 },
      { id: 'W004', cn: '花枝丸', vi: 'Viên mực trắng', unit: '包', low: 1 },

      { id: 'W007', cn: '百頁豆腐', vi: 'Đậu phụ trắng', unit: '包', low: 15 },
      { id: 'W008', cn: '起司條', vi: 'Phô mai que', unit: '包', low: 2 },
      { id: 'W009', cn: '魷米花', vi: 'Mực popcorn', unit: '包', low: 2 },
      { id: 'W010', cn: '牛蒡甜不辣', vi: 'Chả cá xâm', unit: '包', low: 2 },
      { id: 'W011', cn: '雞心', vi: 'Tim gà', unit: '串', low: 20 },
      { id: 'W012', cn: '雞胗', vi: 'Mề gà', unit: '串', low: 20 },
      { id: 'W013', cn: '皮蛋', vi: 'Trứng bắc thảo', unit: '顆', low: 6 },
      { id: 'W014', cn: '糯米腸', vi: 'Dồi nếp', unit: '包', low: 5 },
      { id: 'W015', cn: '銀絲卷', vi: 'Banh Bao', unit: '包', low: 3 },
      { id: 'W016', cn: '山藥捲', vi: 'Bánh khoai môn', unit: '捲', low: 1 },
      { id: 'W017', cn: '玲玲捲', vi: 'Ling Ling Roll', unit: '捲', low: 20 },
      { id: 'W018', cn: '鹹蛋黃芋泥球', vi: 'Khoai môn trứng', unit: '包', low: 1 },
      { id: 'W019', cn: '洋蔥圈', vi: 'Vòng hành tây', unit: '包', low: 4 },
      { id: 'W020', cn: '可樂', vi: 'Cola', unit: '罐', low: 24 },
      { id: 'W021', cn: '雪碧', vi: 'Sprite', unit: '罐', low: 24 },
      { id: 'W022', cn: '竹籤', vi: 'Xiên', unit: '包', low: 2 },
      { id: 'W023', cn: '八兩紙袋', vi: 'Túi Giấy to', unit: '包', low: 10 },
      { id: 'W024', cn: '六兩紙袋', vi: 'Túi Giấy Vừa', unit: '包', low: 10 },
      { id: 'W025', cn: '四兩紙袋', vi: 'Túi Giấy Nhỏ', unit: '包', low: 10 },
      { id: 'W026', cn: '飲料袋', vi: 'Túi Ức Gà', unit: '包', low: 5 },
      { id: 'W027', cn: '半斤提袋', vi: 'Túi Vàng', unit: '包', low: 5 },
      { id: 'W028', cn: '四兩提袋', vi: 'Túi Cam', unit: '包', low: 8 },
    ]
  };

  let currentStore = '總店';
  let currentDate = new Date().toISOString().split('T')[0];
  let trendChart = null;
  let historicalData = {};

  // Set date label
  function fmtDate(d) {
    const [y, m, day] = d.split('-');
    return `${m}/${day}`;
  }
  document.getElementById('date-label').textContent = fmtDate(currentDate);

  window.selectStore = function(store) {
    currentStore = store;
    document.getElementById('btn-total').classList.toggle('active', store === '總店');
    document.getElementById('btn-mj').classList.toggle('active', store === '麥金店');
    loadData();
  };

  window.changeDate = function(delta) {
    const d = new Date(currentDate);
    d.setDate(d.getDate() + delta);
    currentDate = d.toISOString().split('T')[0];
    document.getElementById('date-label').textContent = fmtDate(currentDate);
    loadData();
  };

  function getStatus(item, stock) {
    if (stock === undefined || stock === null) return 'empty';
    if (stock === 0) return 'critical';
    if (stock <= item.low * 0.5) return 'critical';
    if (stock <= item.low) return 'low';
    return 'ok';
  }

  function getBadgeText(status) {
    if (status === 'ok') return '✓ 充足';
    if (status === 'low') return '⚠ 偏低';
    if (status === 'critical') return '✕ 急補';
    return '○ 未填';
  }

  async function loadData() {
    const docId = `${currentStore}_${currentDate}`;
    const docRef = doc(db, 'stock', docId);
    const contentEl = document.getElementById('content');
    const debugEl = document.getElementById('debug');

    contentEl.innerHTML = '<div class="loading">載入中...</div>';

    try {
      const snapshot = await getDoc(docRef);
      const data = snapshot.data() || {};
      const items = {};

      // 相容兩種 Firestore 格式
      if (data.items && typeof data.items === 'object') {
        for (const [k, v] of Object.entries(data.items)) {
          items[k] = typeof v === 'number' ? v
            : (v?.integerValue !== undefined ? parseInt(v.integerValue) : v?.doubleValue);
        }
      }
      for (const [k, v] of Object.entries(data)) {
        if (k.startsWith('items.')) {
          const id = k.replace('items.', '');
          if (!items[id]) {
            items[id] = typeof v === 'number' ? v
              : (v?.integerValue !== undefined ? parseInt(v.integerValue) : v?.doubleValue);
          }
        }
      }

      // debugEl.textContent = `解析 items: ${JSON.stringify(items)}`;

      // KPI
      const allItems = [...ITEMS.daily, ...ITEMS.weekly];
      const filled = allItems.filter(i => items[i.id] !== undefined).length;
      const alertItems = allItems.filter(i => {
        const s = items[i.id];
        return s !== undefined && s <= i.low;
      });
      document.getElementById('kpi-filled').querySelector('.val').textContent = filled;
      document.getElementById('kpi-total-stock').querySelector('.val').textContent = allItems.length;
      const alertKpi = document.getElementById('kpi-alert');
      alertKpi.querySelector('.val').textContent = alertItems.length;
      alertKpi.className = 'kpi-card' + (alertItems.length > 0 ? ' red' : ' green');

      // Badge on store buttons
      document.getElementById('badge-total').textContent = currentStore === '總店' ? alertItems.length : '';
      document.getElementById('badge-mj').textContent = currentStore === '麥金店' ? alertItems.length : '';

      // Alert section
      const alertSection = document.getElementById('alert-section');
      const alertList = document.getElementById('alert-list');
      if (alertItems.length > 0) {
        alertSection.classList.add('show');
        alertList.innerHTML = alertItems.slice(0, 5).map(item => {
          const s = items[item.id];
          return `<div class="alert-item">
            <div><div class="name">${item.cn}</div><div class="vi">${item.vi} · 警戒${item.low}${item.unit}</div></div>
            <div class="stock">${s} <small>${item.unit}</small></div>
          </div>`;
        }).join('');
      } else {
        alertSection.classList.add('show');
        alertList.innerHTML = '<div class="alert-empty">✅ 所有品項庫存充足</div>';
      }

      renderContent(items);

      // 載入歷史資料並繪製趨勢圖
      loadHistoricalData(currentStore).catch(e => console.log('History load failed:', e));
    } catch (e) {
      debugEl.textContent = '錯誤: ' + e.message;
      contentEl.innerHTML = '<div class="no-data">❌ 載入失敗：' + e.message + '</div>';
    }
  }

  // 讀取歷史資料
  async function loadHistoricalData(store) {
    try {
      const historyRef = collection(db, 'stock_history');
      const q = query(historyRef, orderBy('date', 'desc'), limit(7));
      const snapshot = await getDocs(q);

      historicalData = {};
      const dates = [];

      snapshot.docs.forEach(doc => {
        const data = doc.data();
        const date = data.date;
        if (!dates.includes(date)) dates.push(date);
        if (!historicalData[store]) historicalData[store] = {};
        if (!historicalData[store][date]) historicalData[store][date] = {};

        const items = {};
        if (data.items && data.items.mapValue) {
          for (const [k, v] of Object.entries(data.items.mapValue.fields || {})) {
            items[k] = typeof v === 'number' ? v
              : (v?.integerValue !== undefined ? parseInt(v.integerValue) : v?.doubleValue !== undefined ? parseFloat(v.doubleValue) : 0);
          }
        }
        historicalData[store][date] = items;
      });

      dates.sort();
      if (dates.length < 2) {
        document.getElementById('trend-section').style.display = 'none';
        return;
      }

      // 選擇需要補貨的品項顯示在圖表上
      const allItems = [...ITEMS.daily, ...ITEMS.weekly];
      const alertIds = allItems
        .filter(i => {
          const s = items[i.id];
          return s !== undefined && s <= i.low * 1.5;
        })
        .map(i => i.id)
        .slice(0, 5);

      if (alertIds.length === 0) {
        document.getElementById('trend-section').style.display = 'none';
        return;
      }

      renderTrendChart(store, dates, alertIds);
    } catch (e) {
      console.log('History load error:', e);
      document.getElementById('trend-section').style.display = 'none';
    }
  }

  // 繪製趨勢圖
  function renderTrendChart(store, dates, itemIds) {
    const trendSection = document.getElementById('trend-section');
    trendSection.style.display = 'block';

    const allItems = [...ITEMS.daily, ...ITEMS.weekly];
    const itemMap = {};
    allItems.forEach(i => itemMap[i.id] = i);

    const datasets = itemIds.map((id, idx) => {
      const item = itemMap[id];
      const color = ['#FF8C00', '#00C853', '#FF1744', '#8888ff', '#FF9100'][idx % 5];
      const data = dates.map(date => {
        const dayItems = historicalData[store]?.[date] || {};
        return dayItems[id] ?? null;
      });

      return {
        label: item.cn,
        data: data,
        borderColor: color,
        backgroundColor: color + '33',
        tension: 0.3,
        fill: false,
        pointRadius: 4
      };
    });

    const ctx = document.getElementById('trendChart').getContext('2d');

    if (trendChart) trendChart.destroy();

    trendChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: dates.map(d => d.slice(5).replace('-', '/')),
        datasets: datasets
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#6B6B8D' } },
          y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#6B6B8D' }, beginAtZero: true }
        }
      }
    });
  }

  function buildItemCard(item, stock) {
    const status = getStatus(item, stock);
    const badge = getBadgeText(status);
    return `
      <div class="item-card status-${status}">
        <div class="card-top">
          <div>
            <div class="cn">${item.cn}</div>
            <div class="vi">${item.vi}</div>
          </div>
          <div class="badge">${badge}</div>
        </div>
        <div class="stock-row">
          ${stock !== undefined
            ? `<div class="stock-num">${stock}</div><div class="unit">${item.unit}</div>`
            : `<div class="stock-num">—</div>`
          }
        </div>
        ${stock !== undefined
          ? `<div class="low-info">低庫存警示：<span>${item.low}${item.unit}</span></div>`
          : ''
        }
      </div>
    `;
  }

  function renderContent(items) {
    const contentEl = document.getElementById('content');
    const dailyItems = ITEMS.daily.filter(i => items[i.id] !== undefined).length;
    const weeklyItems = ITEMS.weekly.filter(i => items[i.id] !== undefined).length;

    contentEl.innerHTML = `
      <div class="section-head">
        <div class="section-title daily">📅 每日品項 <span class="count">${dailyItems}/${ITEMS.daily.length}</span></div>
      </div>
      <div class="item-grid">
        ${ITEMS.daily.map(item => buildItemCard(item, items[item.id])).join('')}
      </div>

      <div class="section-head">
        <div class="section-title weekly">📦 每週品項 <span class="count">${weeklyItems}/${ITEMS.weekly.length}</span></div>
      </div>
      <div class="item-grid">
        ${ITEMS.weekly.map(item => buildItemCard(item, items[item.id])).join('')}
      </div>
    `;
  }

  loadData();
</script>
</body>
