<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍗 鮮樂炸雞 - 老闆視角</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      padding: 16px;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 20px 0 16px;
      margin-bottom: 16px;
    }
    .header h1 { 
      font-size: 28px; 
      color: #FF8C00; 
      text-shadow: 0 0 20px rgba(255,140,0,0.3);
    }
    .header p { font-size: 13px; color: #666; margin-top: 6px; }

    /* Store Selector */
    .stores {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .store-btn {
      flex: 1;
      padding: 18px;
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      border: 2px solid #333;
      border-radius: 16px;
      color: #888;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }
    .store-btn.active {
      border-color: #FF8C00;
      background: linear-gradient(145deg, #FF8C00, #e07800);
      color: #fff;
      box-shadow: 0 4px 20px rgba(255,140,0,0.4);
      transform: scale(1.02);
    }

    /* Date Nav */
    .date-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      background: #1a1a2e;
      padding: 12px 16px;
      border-radius: 12px;
    }
    .date-nav button {
      padding: 10px 18px;
      background: #333;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }
    .date-nav span {
      flex: 1;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      color: #FF8C00;
    }

    /* Section Title */
    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin: 24px 0 14px;
      padding: 12px 16px;
      background: linear-gradient(90deg, #FF8C00 0%, transparent 100%);
      border-radius: 10px;
      border-left: 4px solid #fff;
    }
    .section-title.daily { background: linear-gradient(90deg, #FF8C00 0%, transparent 100%); }
    .section-title.weekly { background: linear-gradient(90deg, #4CAF50 0%, transparent 100%); }

    /* Item Grid */
    .item-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 8px;
    }
    .item-card {
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      border-radius: 16px;
      padding: 20px 16px;
      text-align: center;
      border: 1px solid #333;
      transition: all 0.2s;
    }
    .item-card.has-stock {
      border-color: #333;
    }
    .item-card .cn { 
      font-size: 22px; 
      font-weight: 800; 
      color: #fff;
      margin-bottom: 6px;
    }
    .item-card .vi { 
      font-size: 13px; 
      color: #666;
      margin-bottom: 10px;
    }
    .item-card .stock {
      font-size: 36px;
      font-weight: 900;
      color: #FF8C00;
      text-shadow: 0 0 15px rgba(255,140,0,0.4);
    }
    .item-card .stock.low { color: #ff4444; text-shadow: 0 0 15px rgba(255,68,68,0.4); }
    .item-card .stock.ok { color: #4CAF50; text-shadow: 0 0 15px rgba(76,175,80,0.4); }
    .item-card .unit { 
      font-size: 14px; 
      color: #888;
      margin-top: 4px;
    }
    .item-card .no-data {
      font-size: 14px;
      color: #444;
      font-style: italic;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
      font-size: 16px;
    }

    /* Debug */
    .debug {
      background: #0a0a15;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 20px;
      font-family: monospace;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>🍗 鮮樂炸雞</h1>
  <p>老闆視角</p>
</div>

<div class="stores">
  <button class="store-btn active" onclick="selectStore('總店')">🏠 總店</button>
  <button class="store-btn" onclick="selectStore('麥金店')">🏪 麥金店</button>
</div>

<div class="date-nav">
  <button onclick="changeDate(-1)">◀</button>
  <span id="date-label">2026-04-05</span>
  <button onclick="changeDate(1)">▶</button>
</div>

<div class="debug" id="debug"></div>

<div id="content">
  <div class="loading">載入中...</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAaHj8E5WWQrllzqZC7OvrYsybhnFbm1T4",
    authDomain: "xianle-stock.firebaseapp.com",
    projectId: "xianle-stock",
    storageBucket: "xianle-stock.firebasestorage.app",
    messagingSenderId: "1029082693636",
    appId: "1:1029082693636:web:2c879df1c137b7a0433551"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const ITEMS = {
    daily: [
      { id: 'D001', cn: '雞排', vi: 'Gà rán miếng (Lườn gà)', unit: '盒', low: 2, order: 6 },
      { id: 'D002', cn: '雞腿', vi: 'Đùi gà', unit: '盒', low: 1, order: 4 },
      { id: 'D003', cn: '雞翅', vi: 'Cánh gà', unit: '盒', low: 1, order: 4 },
      { id: 'D004', cn: '鹹酥雞', vi: 'Gà popcorn (Gà không xương)', unit: '包', low: 5, order: 15 },
      { id: 'D005', cn: '雞軟骨', vi: 'Sụn gà', unit: '包', low: 3, order: 10 },
      { id: 'D006', cn: '甜不辣', vi: 'Chả cá sợi (Tianbu-la)', unit: '包', low: 3, order: 10 },
      { id: 'D007', cn: '薯條', vi: 'Khoai tây nhỏ', unit: '包', low: 3, order: 10 },
      { id: 'D008', cn: '脆薯', vi: 'Khoai tây to', unit: '包', low: 2, order: 6 },
      { id: 'D009', cn: '青椒', vi: 'Ớt chuông xanh', unit: '包', low: 5, order: 15 },
      { id: 'D010', cn: '玉米', vi: 'Ngô (Bắp)', unit: '包', low: 5, order: 15 },
      { id: 'D011', cn: '四季豆', vi: 'Đậu cove màu xanh', unit: '包', low: 5, order: 15 },
      { id: 'D012', cn: '杏鮑菇', vi: 'Nấm trắng', unit: '包', low: 5, order: 15 },
      { id: 'D013', cn: '香菇', vi: 'Nấm nâu', unit: '包', low: 5, order: 15 },
      { id: 'D014', cn: '豬血糕', vi: 'Tiết heo nếp / Miếng', unit: '包', low: 15, order: 40 },
      { id: 'D015', cn: '雞蛋豆腐', vi: 'Đậu phụ trứng / Hộp', unit: '盒', low: 5, order: 15 },
      { id: 'D016', cn: '雞脖子', vi: 'Cổ gà', unit: '包', low: 3, order: 10 },
      { id: 'D017', cn: '耐炸油', vi: 'Dầu Rán', unit: '桶', low: 2, order: 5 },
      { id: 'D018', cn: '脆皮粉', vi: 'Bột Ướt', unit: '包', low: 1, order: 4 },
      { id: 'D019', cn: '白色雞排粉', vi: 'Bột Khô', unit: '包', low: 1, order: 4 },
    ],
    weekly: [
      { id: 'W001', cn: '小卷天婦羅', vi: 'Tempura mực ống', unit: '包', low: 1, order: 5 },
      { id: 'W002', cn: '包蛋天婦羅', vi: 'Tempura bọc trứng', unit: '包', low: 1, order: 5 },
      { id: 'W003', cn: '地瓜', vi: 'Khoai lang / g', unit: '包', low: 1, order: 5 },
      { id: 'W004', cn: '花枝丸', vi: 'Viên mực màu trắng to', unit: '包', low: 1, order: 5 },
      { id: 'W005', cn: '虱脆丸', vi: 'Viên màu trắng nhỏ', unit: '包', low: 3, order: 10 },
      { id: 'W006', cn: '豆干', vi: 'Đậu phụ vàng', unit: '包', low: 2, order: 8 },
      { id: 'W007', cn: '百頁豆腐', vi: 'Đậu phụ màu trắng trong bao', unit: '包', low: 15, order: 40 },
      { id: 'W008', cn: '起司條', vi: 'Phô mai que', unit: '包', low: 2, order: 8 },
      { id: 'W009', cn: '魷米花', vi: 'Mực popcorn', unit: '包', low: 2, order: 8 },
      { id: 'W010', cn: '牛蒡甜不辣', vi: 'Chả cá xâm', unit: '包', low: 2, order: 8 },
      { id: 'W011', cn: '雞心', vi: 'Tim gà / Xiên', unit: '串', low: 20, order: 60 },
      { id: 'W012', cn: '雞胗', vi: 'Mề gà / Xiên', unit: '串', low: 20, order: 60 },
      { id: 'W013', cn: '皮蛋', vi: 'Trứng bắc thảo / Quả', unit: '顆', low: 6, order: 20 },
      { id: 'W014', cn: '糯米腸', vi: 'Dồi nếp / Gói', unit: '包', low: 5, order: 15 },
      { id: 'W015', cn: '銀絲卷', vi: 'Banh Bao', unit: '包', low: 3, order: 10 },
      { id: 'W016', cn: '山藥捲', vi: 'Bánh khoai môn màu tím', unit: '捲', low: 1, order: 5 },
      { id: 'W017', cn: '玲玲捲', vi: 'Váng đậu cuộn (Ling Ling Roll)', unit: '捲', low: 20, order: 60 },
      { id: 'W018', cn: '鹹蛋黃芋泥球', vi: 'Viên khoai môn trứng muối', unit: '包', low: 1, order: 5 },
      { id: 'W019', cn: '洋蔥圈', vi: 'Vòng hành tây chiên', unit: '包', low: 4, order: 12 },
      { id: 'W020', cn: '可樂', vi: 'Cola', unit: '罐', low: 24, order: 48 },
      { id: 'W021', cn: '雪碧', vi: 'Sprite', unit: '罐', low: 24, order: 48 },
      { id: 'W022', cn: '竹籤', vi: 'Xiên', unit: '包', low: 2, order: 6 },
      { id: 'W023', cn: '八兩紙袋', vi: 'Túi Giấy to', unit: '包', low: 10, order: 30 },
      { id: 'W024', cn: '六兩紙袋', vi: 'Túi Giấy Vừa', unit: '包', low: 10, order: 30 },
      { id: 'W025', cn: '四兩紙袋', vi: 'Túi Giấy Nhỏ', unit: '包', low: 10, order: 30 },
      { id: 'W026', cn: '飲料袋', vi: 'Túi Chỉ Đựng Ức Gà', unit: '包', low: 5, order: 15 },
      { id: 'W027', cn: '半斤提袋', vi: 'Túi Màu Vàng', unit: '包', low: 5, order: 15 },
      { id: 'W028', cn: '四兩提袋', vi: 'Túi Màu Cam', unit: '包', low: 8, order: 24 },
    ]
  };

  let currentStore = '總店';
  let currentDate = new Date().toISOString().split('T')[0];

  window.selectStore = function(store) {
    currentStore = store;
    document.querySelectorAll('.store-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(store)));
    loadData();
  };

  window.changeDate = function(delta) {
    const d = new Date(currentDate);
    d.setDate(d.getDate() + delta);
    currentDate = d.toISOString().split('T')[0];
    document.getElementById('date-label').textContent = currentDate;
    loadData();
  };

  async function loadData() {
    const docId = `${currentStore}_${currentDate}`;
    const docRef = doc(db, 'stock', docId);
    const debugEl = document.getElementById('debug');
    const contentEl = document.getElementById('content');

    contentEl.innerHTML = '<div class="loading">載入中...</div>';

    try {
      const snapshot = await getDoc(docRef);
      
      const data = snapshot.data() || {};
      const items = {};
      
      // 解析 items
      // 方法1：檢查 Firebase SDK 解析後的 items 物件
      if (data.items && typeof data.items === 'object') {
        for (const [key, value] of Object.entries(data.items)) {
          if (typeof value === 'number') {
            items[key] = value;
          } else if (value && (value.integerValue !== undefined || value.doubleValue !== undefined)) {
            items[key] = value.integerValue !== undefined ? parseInt(value.integerValue, 10) : parseFloat(value.doubleValue, 10);
          }
        }
      }
      
      // 方法2：檢查扁平的欄位（items.D001, items.D002...）
      for (const [key, value] of Object.entries(data)) {
        if (key.startsWith('items.')) {
          const itemId = key.replace('items.', '');
          if (!items[itemId]) { // 還沒解析過
            if (typeof value === 'number') {
              items[itemId] = value;
            } else if (value && (value.integerValue !== undefined || value.doubleValue !== undefined)) {
              items[itemId] = value.integerValue !== undefined ? parseInt(value.integerValue, 10) : parseFloat(value.doubleValue, 10);
            }
          }
        }
      }
      
      debugEl.textContent = `解析 items: ${JSON.stringify(items)}`;
      renderContent(items);
    } catch (e) {
      debugEl.textContent = '錯誤: ' + e.message;
      contentEl.innerHTML = '<div class="loading">載入失敗: ' + e.message + '</div>';
    }
  }

  function renderContent(items) {
    const contentEl = document.getElementById('content');
    
    let html = `
      <div class="section-title daily">📅 每日品項</div>
      <div class="item-grid">
        ${ITEMS.daily.map(item => buildItemCard(item, items)).join('')}
      </div>
      
      <div class="section-title weekly">📦 每週品項</div>
      <div class="item-grid">
        ${ITEMS.weekly.map(item => buildItemCard(item, items)).join('')}
      </div>
    `;
    
    contentEl.innerHTML = html;
  }

  function buildItemCard(item, items) {
    const val = items[item.id];
    const hasStock = val !== undefined;
    const isLow = hasStock && val < item.low;
    const stockClass = hasStock ? (isLow ? 'low' : 'ok') : '';
    
    return `
      <div class="item-card ${hasStock ? 'has-stock' : ''}">
        <div class="cn">${item.cn}</div>
        <div class="vi">${item.vi}</div>
        ${hasStock 
          ? `<div class="stock ${stockClass}">${val}</div><div class="unit">${item.unit}</div>`
          : `<div class="no-data">尚無資料</div>`
        }
      </div>
    `;
  }

  // Init
  document.getElementById('date-label').textContent = currentDate;
  loadData();
</script>
</body>
</html>
